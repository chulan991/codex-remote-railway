name: lint

on:
  push:
    branches: [main, staging]
  pull_request:

permissions:
  contents: read

jobs:
  hadolint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Some rules trip on our multi-stage / apt-install pattern; loosen
          # them here so the check gives signal without being noisy.
          ignore: DL3008,DL3013,DL3018,DL3059

  shellcheck:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --shell=bash --severity=warning entrypoint.sh scripts/*.sh

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: codex-remote-railway:ci
